<!DOCTYPE html>
<html>
<head><title>Quotes to Scrape</title></head>
<body>
  <!-- valid quote -->
  <div class="quote">
    <span class="text">"Valid quote."</span>
    <small class="author">Someone</small>
    <div class="tags"></div>
  </div>
  <!-- malformed: missing author -->
  <div class="quote">
    <span class="text">"No author here."</span>
    <div class="tags"></div>
  </div>
  <!-- no next pager -->
</body>
</html>
